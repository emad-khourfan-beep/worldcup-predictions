<script>
const GOOGLE_SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbxzzsAiKHUaMZhU98fUS9DU7sghFXSZblwhB1LtW-kA-h3W1iKMTlys89MVHMO6bkCg/exec";

let matches = [];

const flags = {
  "قطر":"🇶🇦","سويسرا":"🇨🇭","تركيا":"🇹🇷","أستراليا":"🇦🇺",
  "ألمانيا":"🇩🇪","كوراساو":"🇨🇼","هولندا":"🇳🇱","اليابان":"🇯🇵",
  "ساحل العاج":"🇨🇮","الإكوادور":"🇪🇨","السويد":"🇸🇪","تونس":"🇹🇳",
  "البرازيل":"🇧🇷","المغرب":"🇲🇦","بلجيكا":"🇧🇪","مصر":"🇪🇬",
  "السعودية":"🇸🇦","الأوروغواي":"🇺🇾","إيران":"🇮🇷","نيوزيلندا":"🇳🇿"
};

function getMatchDateTime(match) {
  return new Date(`${match.date}T${match.time}:00+04:00`);
}

function getCountdown(match) {
  const now = new Date();
  const start = getMatchDateTime(match);
  const diff = start - now;

  if (diff <= 0) return "بدأت المباراة";

  const hours = Math.floor(diff / (1000 * 60 * 60));
  const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));

  return `متبقي ${hours} ساعة و ${minutes} دقيقة`;
}

function isPredictionClosed(match) {
  const now = new Date();
  const start = getMatchDateTime(match);
  const closeTime = new Date(start.getTime() - 60 * 60 * 1000);
  return now >= closeTime;
}

async function loadMatches() {
  try {
    const response = await fetch(GOOGLE_SCRIPT_URL);
    matches = await response.json();
    renderMatches();
  } catch (error) {
    document.getElementById("matches").innerHTML =
      "❌ لم يتم تحميل المباريات. تأكد من رابط Apps Script.";
  }
}

function renderMatches() {
  const container = document.getElementById("matches");
  container.innerHTML = "";

  if (matches.length === 0) {
    container.innerHTML = "لا توجد مباريات مضافة اليوم.";
    return;
  }

  matches.forEach(match => {
    const homeFlag = flags[match.home] || "🏳️";
    const awayFlag = flags[match.away] || "🏳️";
    const closed = isPredictionClosed(match);

    container.innerHTML += `
      <div class="match">
        <div class="match-title">
          <div class="flags">${homeFlag} × ${awayFlag}</div>
          ${match.home} × ${match.away}
          <br>
          <small>⏰ وقت المباراة: ${match.time}</small>
          <br>
          <small>${getCountdown(match)}</small>
          <br>
          <small style="color:${closed ? '#ff6b6b' : '#7CFF9B'}">
            ${closed ? '🔒 التوقع مغلق' : '✅ التوقع مفتوح'}
          </small>
        </div>

        <div class="score-grid">
          <input type="number" min="0" id="home_${match.id}" 
            placeholder="أهداف ${match.home}" ${closed ? "disabled" : "required"}>
          <input type="number" min="0" id="away_${match.id}" 
            placeholder="أهداف ${match.away}" ${closed ? "disabled" : "required"}>
        </div>
      </div>
    `;
  });
}

document.getElementById("predictionForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const openMatches = matches.filter(match => !isPredictionClosed(match));

  if (openMatches.length === 0) {
    alert("🔒 تم إغلاق التوقعات لجميع مباريات اليوم");
    return;
  }

  const playerName = document.getElementById("playerName").value.trim();
  const whatsapp = document.getElementById("whatsapp") ? document.getElementById("whatsapp").value.trim() : "";

  const predictions = openMatches.map(match => ({
    id: match.id,
    homeTeam: match.home,
    awayTeam: match.away,
    homeGoals: document.getElementById(`home_${match.id}`).value,
    awayGoals: document.getElementById(`away_${match.id}`).value
  }));

  await fetch(GOOGLE_SCRIPT_URL, {
    method: "POST",
    mode: "no-cors",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      playerName,
      whatsapp,
      predictions
    })
  });

  alert("✅ تم إرسال توقعك بنجاح");
  this.reset();
  renderMatches();
});

loadMatches();
setInterval(renderMatches, 60000);
</script>
