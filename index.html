<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>توقعات كأس العالم</title>

<style>
body{
  margin:0;
  font-family:Arial,Tahoma,sans-serif;
  background:#07172f;
  color:white;
  text-align:center;
}
.container{
  max-width:700px;
  margin:auto;
  padding:20px;
}
h1{
  color:#ffd54a;
}
.card{
  background:#10284f;
  padding:20px;
  border-radius:18px;
  margin-top:20px;
}
.match{
  background:#173866;
  margin:15px 0;
  padding:15px;
  border-radius:12px;
}
input{
  padding:12px;
  width:90%;
  margin:8px;
  border-radius:8px;
  border:0;
  font-size:16px;
}
button{
  background:#ffd54a;
  color:#07172f;
  border:0;
  padding:15px;
  width:95%;
  border-radius:10px;
  font-size:18px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
  <h1>🏆 توقعات كأس العالم</h1>

  <div class="card">
    <form id="predictionForm">
      <input id="playerName" placeholder="اكتب اسمك" required>

      <div id="matches">جاري تحميل المباريات...</div>

      <button type="submit">إرسال التوقع</button>
    </form>
  </div>
</div>

<script>
const GOOGLE_SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbxzzsAiKHUaMZhU98fUS9DU7sghFXSZblwhB1LtW-kA-h3W1iKMTlys89MVHMO6bkCg/exec";

let matches = [];

async function loadMatches() {
  const response = await fetch(GOOGLE_SCRIPT_URL);
  matches = await response.json();
  renderMatches();
}

function renderMatches() {
  const container = document.getElementById("matches");
  container.innerHTML = "";

  matches.forEach(match => {
    container.innerHTML += `
      <div class="match">
        <h3>${match.home} × ${match.away}</h3>
        <input type="number" min="0" id="home_${match.id}" placeholder="أهداف ${match.home}" required>
        <input type="number" min="0" id="away_${match.id}" placeholder="أهداف ${match.away}" required>
      </div>
    `;
  });
}

document.getElementById("predictionForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const playerName = document.getElementById("playerName").value;

  const predictions = matches.map(match => ({
    id: match.id,
    homeTeam: match.home,
    awayTeam: match.away,
    homeGoals: document.getElementById(`home_${match.id}`).value,
    awayGoals: document.getElementById(`away_${match.id}`).value
  }));

  await fetch(GOOGLE_SCRIPT_URL, {
    method: "POST",
    mode: "no-cors",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ playerName, predictions })
  });

  alert("✅ تم إرسال توقعك بنجاح");
  this.reset();
});

loadMatches();
</script>

</body>
</html>index.html
